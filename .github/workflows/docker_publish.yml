name: Build and Publish Docker Image

on:
  push:
    branches: [ master ]
    paths:
      - 'ci/java/**'
      - 'docker/**'
      - 'tracker-profiles-screenshots/**'
      - 'pom.xml'
  workflow_dispatch: # allows manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-distribution: 'temurin'
          java-version: '26'
          maven-version: '3.9.15'

      - name: Run Java lints and tests with Maven (including SonarQube)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONARQUBE_PAT: ${{ secrets.SONARQUBE_PAT }}
        run: mvn clean install -Dall -Dsonarqube

  docker-and-release:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    env:
      has_changes: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # Needed for pushing tags

      - name: Fetch tags
        run: git fetch --tags

      - name: Configure git user
        run: |
          git config user.name "publisher"
          git config user.email "github-actions@github.com"

      - name: Read current version
        id: version
        run: |
          version=$(cat VERSION)
          echo "Using version: ${version}"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-distribution: 'temurin'
          java-version: '26'
          maven-version: '3.9.15'

      - name: Set Maven version from VERSION file
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false -DprocessAllModules

      - name: Verify build with updated versions
        run: mvn compile -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v7.1.0
        with:
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            GIT_REVISION=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=zodac/tracker-profiles:cache
          cache-to: type=registry,ref=zodac/tracker-profiles:cache,mode=max
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            zodac/tracker-profiles:${{ steps.version.outputs.version }}
            zodac/tracker-profiles:latest

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
          echo "prev_tag=${PREV_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Generate categorised changelog
        id: changelog
        run: .github/scripts/generate_changelog.sh "${{ steps.prev_tag.outputs.prev_tag }}"

      - name: Build release body
        id: release_body
        env:
          CHANGELOG_CONTENT: ${{ env.changelog_content }}
        run: .github/scripts/generate_github_release_content.sh "${{ steps.version.outputs.version }}" "${{ steps.prev_tag.outputs.prev_tag }}"

      - name: Update tracker count in README
        run: |
          tracker_count=$(grep -R --include='*.java' '^@TrackerHandler(' . | cut -d '"' -f2 | sort -u | wc -l | tr -d '[:space:]')
          sed -i -E "s/(There are currently \*\*)[0-9]+(\*\* supported trackers listed below\.)/\1${tracker_count}\2/" README.md

      - name: Bump patch version in VERSION file
        run: .github/scripts/bump_version.sh "${{ steps.version.outputs.version }}"

      - name: Tag current version in git (only if Docker build succeeds)
        if: env.has_changes == 'true'
        run: git tag ${{ steps.version.outputs.version }}

      - name: Push commit and tag if there were changes
        if: env.has_changes == 'true'
        uses: ad-m/github-push-action@v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          tags: "true"

      - name: Create GitHub Release
        if: env.has_changes == 'true'
        uses: ncipollo/release-action@v1.21.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: v${{ steps.version.outputs.version }}
          tag: ${{ steps.version.outputs.version }}
          body: ${{ steps.release_body.outputs.body }}

      - name: Summary
        if: env.has_changes == 'true'
        run: |
          echo "Docker image and GitHub release created for version: ${{ steps.version.outputs.version }}"
          echo "Pull the image using:"
          echo "docker pull zodac/tracker-profiles:${{ steps.version.outputs.version }}"
