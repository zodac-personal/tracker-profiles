# Suppresses WARNING-level messages from Selenium's CDP version-finder and ChromiumDriver that are
# emitted each time a RemoteWebDriver is instantiated. Selenium calls LogManager.reset() during
# driver initialisation, which wipes any programmatically-set JUL logger levels.
#
# This file is passed to the JVM via -Djava.util.logging.config.file (see docker/scripts/start.sh).
# JUL re-reads the file at that path after every LogManager.reset(), so the levels survive across
# multiple driver creations for the lifetime of the application.
org.openqa.selenium.level=SEVERE
org.openqa.selenium.devtools.level=SEVERE
org.openqa.selenium.chromium.level=SEVERE
